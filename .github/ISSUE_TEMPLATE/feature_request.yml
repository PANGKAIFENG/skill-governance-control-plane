name: 功能建议
description: 描述一个真实的 Skill 治理场景
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: scenario
    attributes:
      label: 用户场景
      description: 你使用哪些 Agent？现在如何管理 Skill？
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 当前痛点
      description: 哪一步最费时、容易出错或无法确认？
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: 期望结果
      description: 描述你希望完成的结果，不必限定具体实现。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 当前替代方案
      description: 你试过哪些工具或流程？为什么还不够？
