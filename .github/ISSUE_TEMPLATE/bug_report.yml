name: Bug 报告
description: 报告可复现的异常行为
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 发生了什么？你原本期望看到什么？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 运行...
        2. 打开...
        3. 看到...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本或 commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境
      description: 操作系统、Python、Skillshare 和相关 Agent 版本
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 脱敏后的日志
      description: 请先删除 token、用户名、私有路径和 Skill 内容
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: 隐私确认
      options:
        - label: 我已确认内容不包含凭据、私有 Skill 或其他敏感信息
          required: true
